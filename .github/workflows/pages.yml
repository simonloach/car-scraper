name: 🌐 Deploy dashboard to Pages

# Publishes the self-contained plots/ folder (index.html + PNGs) to GitHub
# Pages. Runs after the daily scrape commits new data, and on manual dispatch.
# One-time setup: repo Settings → Pages → Source: "GitHub Actions".

on:
  push:
    branches: [main]
    paths:
      - 'plots/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment; don't cancel an in-progress run.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: 🔄 Checkout
        uses: actions/checkout@v4

      - name: ⚙️ Configure Pages
        uses: actions/configure-pages@v5

      - name: 📤 Upload plots/ as Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: plots

      - name: 🚀 Deploy
        id: deployment
        uses: actions/deploy-pages@v4
