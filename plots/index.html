<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Car Tracker · market dashboard</title>
<script src="https://cdn.plot.ly/plotly-2.35.2.min.js" charset="utf-8"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<style>
  :root{
    --bg:#0B0E14; --surface:#141A24; --surface-2:#1B2230; --border:#242C3A;
    --text:#E6EAF2; --muted:#8B95A7; --muted-2:#5C6678;
    --primary:#60A5FA; --primary-deep:#3B82F6; --accent:#F59E0B;
    --good:#34D399; --bad:#F87171;
    --r:12px; --r-sm:8px; --maxw:1180px;
    --sans:'Fira Sans',system-ui,sans-serif; --mono:'Fira Code',ui-monospace,monospace;
  }
  *{box-sizing:border-box}
  html{color-scheme:dark}
  body{margin:0;background:var(--bg);color:var(--text);font-family:var(--sans);
       font-size:16px;line-height:1.5;-webkit-font-smoothing:antialiased}
  .num{font-family:var(--mono);font-variant-numeric:tabular-nums;letter-spacing:-.01em}
  a{color:var(--primary);text-decoration:none}
  a:hover{text-decoration:underline}
  :focus-visible{outline:2px solid var(--primary);outline-offset:2px;border-radius:4px}
  .wrap{max-width:var(--maxw);margin:0 auto;padding:0 20px}

  /* header */
  header.top{position:sticky;top:0;z-index:20;background:rgba(11,14,20,.82);
    backdrop-filter:blur(10px);border-bottom:1px solid var(--border)}
  .top-row{display:flex;align-items:center;gap:14px;padding:14px 0}
  .brand{display:flex;align-items:center;gap:10px;font-weight:700;font-size:18px;letter-spacing:-.02em}
  .brand svg{color:var(--primary)}
  .gen{color:var(--muted);font-size:13px;margin-left:14px}
  .toggle{margin-left:auto;display:flex;align-items:center;gap:8px;font-size:13px;
    color:var(--muted);cursor:pointer;user-select:none}
  .toggle input{width:34px;height:18px;appearance:none;background:var(--surface-2);
    border:1px solid var(--border);border-radius:999px;position:relative;cursor:pointer;transition:.18s}
  .toggle input:checked{background:var(--primary-deep);border-color:var(--primary-deep)}
  .toggle input::after{content:'';position:absolute;top:1px;left:1px;width:14px;height:14px;
    border-radius:50%;background:#fff;transition:.18s}
  .toggle input:checked::after{left:17px}
  nav.models{display:flex;gap:6px;flex-wrap:wrap;padding-bottom:12px}
  nav.models a{font-size:13px;font-weight:500;color:var(--muted);padding:6px 12px;
    border:1px solid var(--border);border-radius:999px;background:var(--surface);transition:.18s}
  nav.models a:hover{color:var(--text);border-color:var(--primary-deep);text-decoration:none}

  /* global kpi strip */
  .gkpis{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin:22px 0 8px}
  .gkpi{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:14px 16px}
  .gkpi .lab{color:var(--muted);font-size:12px;text-transform:uppercase;letter-spacing:.06em;
    display:flex;align-items:center;gap:7px}
  .gkpi .val{font-size:26px;font-weight:600;margin-top:6px}

  /* model section */
  section.model{margin:40px 0;scroll-margin-top:120px}
  .m-head{display:flex;align-items:baseline;gap:12px;flex-wrap:wrap;margin-bottom:14px}
  .m-head h2{font-size:21px;font-weight:600;margin:0;letter-spacing:-.02em}
  .m-head .tag{color:var(--muted);font-size:13px;font-family:var(--mono)}

  /* facet filters */
  .facets{display:flex;flex-wrap:wrap;align-items:center;gap:8px 14px;margin-bottom:16px}
  .facet-group{display:flex;flex-wrap:wrap;align-items:center;gap:6px}
  .facet-group .dim{color:var(--muted-2);font-size:11px;text-transform:uppercase;
    letter-spacing:.06em;margin-right:2px}
  .chip{font-family:var(--sans);font-size:12.5px;color:var(--muted);background:var(--surface);
    border:1px solid var(--border);border-radius:999px;padding:4px 11px;cursor:pointer;
    transition:.15s;display:inline-flex;align-items:center;gap:5px;line-height:1.3}
  .chip:hover{color:var(--text);border-color:var(--primary-deep)}
  .chip[aria-pressed="true"]{color:#fff;background:var(--primary-deep);border-color:var(--primary-deep)}
  .chip .cnt{font-family:var(--mono);font-size:11px;opacity:.65}
  .chip.empty{opacity:.4}
  .chip-clear{margin-left:2px;color:var(--muted-2);background:none;border:none;cursor:pointer;
    font-size:12px;text-decoration:underline;padding:4px 2px}
  .chip-clear:hover{color:var(--text)}
  .origin{font-size:15px;line-height:1}

  .kpis{display:grid;grid-template-columns:repeat(6,1fr);gap:10px;margin-bottom:16px}
  .kpi{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-sm);padding:12px}
  .kpi .lab{color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.05em;
    display:flex;align-items:center;gap:6px}
  .kpi .v{font-size:18px;font-weight:600;margin-top:6px}
  .kpi .sub{font-size:12px;color:var(--muted);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .pos{color:var(--good)} .neg{color:var(--bad)}

  .charts{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:14px 14px 6px}
  .card h3{margin:0 0 2px;font-size:14px;font-weight:600}
  .card .hint{margin:0 0 8px;font-size:12px;color:var(--muted)}
  .plot{height:300px}
  .empty{height:100%;min-height:300px;display:flex;align-items:center;justify-content:center;color:var(--muted-2);font-size:13px;text-align:center;padding:0 12px}

  /* table */
  .tablewrap{margin-top:16px;background:var(--surface);border:1px solid var(--border);
    border-radius:var(--r);overflow:hidden}
  .tbar{display:flex;align-items:center;gap:14px;padding:12px 14px;border-bottom:1px solid var(--border)}
  .tbar .t{font-size:14px;font-weight:600}
  .tbar label{margin-left:auto;font-size:13px;color:var(--muted);display:flex;align-items:center;gap:7px;cursor:pointer}
  table{width:100%;border-collapse:collapse;font-size:13px}
  th,td{text-align:right;padding:9px 14px;border-bottom:1px solid var(--border);white-space:nowrap}
  th:nth-child(2),td:nth-child(2){text-align:left;white-space:normal}
  th{color:var(--muted);font-weight:500;font-size:11px;text-transform:uppercase;letter-spacing:.05em;
    cursor:pointer;user-select:none;position:sticky;top:0;background:var(--surface-2)}
  tbody tr:hover{background:var(--surface-2)}
  tbody tr.sold{opacity:.5}
  tbody tr:last-child td{border-bottom:none}
  .deal-badge{display:inline-block;padding:1px 7px;border-radius:999px;font-family:var(--mono);
    font-size:12px;font-weight:500}
  .deal-good{background:rgba(52,211,153,.14);color:var(--good)}
  .deal-bad{background:rgba(248,113,113,.14);color:var(--bad)}
  .deal-na{color:var(--muted-2)}
  footer{color:var(--muted-2);font-size:12px;text-align:center;padding:36px 0 28px}

  @media(max-width:860px){
    .gkpis{grid-template-columns:repeat(2,1fr)}
    .kpis{grid-template-columns:repeat(2,1fr)}
    .charts{grid-template-columns:1fr}
  }
  @media(prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important}}
</style>
</head>

function linfit(xs, ys){
  const n=xs.length; if(n<2) return null;
  let sx=0,sy=0,sxx=0,sxy=0;
  for(let i=0;i<n;i++){sx+=xs[i];sy+=ys[i];sxx+=xs[i]*xs[i];sxy+=xs[i]*ys[i];}
  const d=n*sxx-sx*sx; if(Math.abs(d)<1e-9) return null;
  const m=(n*sxy-sx*sy)/d; return {m, b:(sy-m*sx)/n};
}
const median = a => { if(!a.length) return 0; const s=[...a].sort((x,y)=>x-y); const m=Math.floor(s.length/2); return s.length%2?s[m]:(s[m-1]+s[m])/2; };

// ---- working set: historical toggle (base) ∩ facet chips (per section) ----
const isActive = c => c.active !== false;
const rowsOf = m => showHistorical ? m.listings : m.listings.filter(isActive);
const FACET_DIMS = [['variant','Engine'],['body','Body'],['trim','Trim'],['country','Origin']];
const UNKNOWN = 'Unknown';
// Facet value of a car for a dimension. Missing/blank -> an explicit "Unknown"
// bucket so a dimension's chip counts always sum to the working-set size (older
// listings predate the origin/trim fields and would otherwise vanish silently).
const facetVal = (c, dim) => { const v = c.facets ? c.facets[dim] : null; return (v==null||v==='') ? UNKNOWN : v; };
// Distinct values for a dim across ALL listings (stable chip set across toggle),
// real values sorted first, the Unknown bucket pinned last.
function dimValues(m, dim){
  const s=new Set(m.listings.map(c=>facetVal(c,dim)));
  const real=[...s].filter(v=>v!==UNKNOWN).sort((a,b)=>a.localeCompare(b));
  return {values:real.concat(s.has(UNKNOWN)?[UNKNOWN]:[]), hasReal:real.length>0};
}
function applyFacets(rows, filters){
  return rows.filter(c=>{
    for(const dim in filters){
      const sel=filters[dim]; if(!sel||!sel.size) continue;
      if(!sel.has(facetVal(c,dim))) return false;
    }
    return true;
  });
}
function hasDrop(c){ const r=(c.price_readings||[]).filter(x=>x&&x[1]>0); return r.length>=2 && r[r.length-1][1]<r[r.length-2][1]; }

// Market trend recomputed from the working set (mirrors reporting.py
// _market_trend): for each day a listing was live, carry its most recent
// reading forward and take the daily median. Reacts to toggle + facet filters.
const dIdx = ms => Math.floor(ms/86400000);          // UTC day index
const parseDay = s => { const t=Date.parse((s||'')+'T00:00:00Z'); return isNaN(t)?null:dIdx(t); };
const isoDay = day => new Date(day*86400000).toISOString().slice(0,10);
function marketTrend(rows){
  const spans=[]; let lo=null, hi=null;
  for(const c of rows){
    const rs=(c.price_readings||[]).filter(r=>r&&r[1]>0)
      .map(r=>[dIdx(r[0]*1000), r[1]]).sort((a,b)=>a[0]-b[0]);
    if(!rs.length) continue;
    let a=parseDay(c.first_seen), b=parseDay(c.last_seen);
    if(a==null||b==null) continue;
    if(b<a){const t=a;a=b;b=t;}
    spans.push([a,b,rs]);
    lo=lo==null?a:Math.min(lo,a); hi=hi==null?b:Math.max(hi,b);
  }
  if(!spans.length) return [];
  const step=(hi-lo)>180?7:1;
  const out=[];
  for(let day=lo; day<=hi; day+=step){
    const ps=[];
    for(const [a,b,rs] of spans){
      if(a<=day && day<=b){
        let p=null; for(const [d,v] of rs){ if(d<=day) p=v; else break; }
        if(p==null) p=rs[0][1];
        if(p) ps.push(p);
      }
    }
    if(ps.length) out.push({date:isoDay(day), median:Math.round(median(ps)), count:ps.length});
  }
  return out;
}
function kpisFor(rows){
  const priced = rows.filter(c=>c.current_price>0);
  const cheapest = priced.length ? priced.reduce((a,b)=>a.current_price<=b.current_price?a:b) : null;
  const miled = rows.filter(c=>c.mileage!=null);
  const lowKm = miled.length ? miled.reduce((a,b)=>a.mileage<=b.mileage?a:b) : null;
  const deals = rows.filter(c=>c.deal_pct!=null);
  const best = deals.length ? deals.reduce((a,b)=>a.deal_pct<=b.deal_pct?a:b) : null;
  return {count:rows.length, median:median(priced.map(c=>c.current_price)),
    cheapest, lowKm, best:(best && best.deal_pct<0)?best:null, drops:rows.filter(hasDrop).length};
}

function kpiCards(rows){
  const k=kpisFor(rows);
  const link=(c,inner)=>c?`<a href="${c.url}" target="_blank" rel="noopener">${inner}</a>`:'';
  const cards=[
    [showHistorical?'Listings':'Active', ICON.car, `<span class="num">${k.count}</span>`, ''],
    ['Median price', ICON.tag, `<span class="num">${fmt(k.median)}</span>`, ''],
    ['Cheapest', ICON.tag, k.cheapest?`<span class="num">${fmt(k.cheapest.current_price)}</span>`:'—',
      link(k.cheapest, '#'+(k.cheapest&&k.cheapest.internal_id))],
    ['Lowest mileage', ICON.gauge, k.lowKm?`<span class="num">${fkm(k.lowKm.mileage)}</span>`:'—',

    ['Best deal', ICON.spark, k.best?`<span class="num pos">${k.best.deal_pct}%</span>`:'—',

    ['Price drops', ICON.drop, `<span class="num ${k.drops?'pos':''}">${k.drops}</span>`, k.drops?'tracked':''],

    <div class="v">${v}</div><div class="sub">${sub||''}</div></div>`).join('');
}

function dealChart(el, rows){
  const ls=rows.filter(c=>c.current_price>0 && c.mileage!=null);
  if(ls.length<2) return empty(el,'Not enough listings');
  const x=ls.map(c=>c.mileage), y=ls.map(c=>c.current_price);
  const scored=ls.some(c=>c.deal_pct!=null);
  const color=ls.map(c=>c.deal_pct==null?0:Math.max(-15,Math.min(15,c.deal_pct)));
  const txt=ls.map(c=>`#${c.internal_id} ${c.title||''}<br>${(c.year||'')} · ${fkm(c.mileage)}<br>${fmt(c.current_price)}`
      + (c.deal_pct!=null?`<br>${c.deal_pct>0?'+':''}${c.deal_pct}% vs expected`:'')
      + (isActive(c)?'':'<br>(sold/delisted)'));
  const traces=[{x,y,text:txt,mode:'markers',type:'scatter',hovertemplate:'%{text}<extra></extra>',
    marker:{size:ls.map(c=>isActive(c)?12:8),
      color:scored?color:C.primary,
      colorscale:scored?[[0,C.good],[0.5,'#64748B'],[1,C.bad]]:undefined,
      cmin:-15,cmax:15,showscale:scored,opacity:ls.map(c=>isActive(c)?1:0.55),
      line:{width:1,color:'rgba(255,255,255,.15)'},
      colorbar:scored?{title:{text:'deal %',font:{size:10}},thickness:8,len:.7,x:1.02}:undefined}}];
  const f=linfit(x,y);
  if(f){const xs=[Math.min(...x),Math.max(...x)];
    traces.unshift({x:xs,y:xs.map(v=>f.m*v+f.b),mode:'lines',hoverinfo:'skip',
      line:{color:'rgba(255,255,255,.18)',dash:'dot',width:1.5}});}
  Plotly.newPlot(el,traces,baseLayout({xaxis:{title:{text:'mileage (km)'}},
    yaxis:{title:{text:'price'}}}),cfg);
}

  ],baseLayout({xaxis:{title:{text:'model year'},dtick:1},yaxis:{title:{text:'price'}}}),cfg);
}
function trackChart(el, rows){
  let moved=rows.filter(c=>(c.price_readings||[]).filter(r=>r[1]>0).length>=2);
  if(!moved.length) return empty(el,'No tracked price changes yet');
  moved=moved.sort((a,b)=>(b.price_readings.length)-(a.price_readings.length)).slice(0,30);
  const traces=moved.map(c=>{
    const pr=c.price_readings.filter(r=>r[1]>0);
    return {x:pr.map(r=>new Date(r[0]*1000)),y:pr.map(r=>r[1]),mode:'lines+markers',
      name:'#'+c.internal_id,hovertemplate:'#'+c.internal_id+' %{y:,.0f} zł<extra></extra>',
      line:{width:1.6},marker:{size:4}};
  });
  Plotly.newPlot(el,traces,baseLayout({yaxis:{title:{text:'price'}},
    showlegend:traces.length<=8,legend:{font:{size:9},orientation:'h',y:-0.25}}),cfg);
}

// ---- table ----
const COLS=[['#','internal_id'],['Title','title'],['Year','year'],['Mileage','mileage'],
  ['Power','engine_power'],['Origin','_origin'],['Deal','deal_pct'],['Price','current_price']];
const NUMERIC=new Set(['internal_id','year','mileage','engine_power','deal_pct','current_price']);
const cellVal=(c,key)=> key==='_origin' ? (c.facets&&c.facets.country) : c[key];
const facetLine=c=>{ const f=c.facets||{};
  return [f.variant,f.body,f.trim].filter(Boolean).join(' · '); };

function renderTable(host, rows, st){
  let data=rows.slice();
  if(st.dealsOnly) data=data.filter(c=>c.deal_pct!=null && c.deal_pct<0);
  data.sort((a,b)=>{let x=cellVal(a,st.sortKey),y=cellVal(b,st.sortKey);
    if(x==null)return 1; if(y==null)return -1;
    return (typeof x==='number')?(st.asc?x-y:y-x):String(x).localeCompare(String(y))*(st.asc?1:-1);});
  const head=COLS.map(([lab,key])=>{
    const s=key===st.sortKey?` aria-sort="${st.asc?'ascending':'descending'}"`:'';
    return `<th data-k="${key}" tabindex="0" role="columnheader"${s}>${lab}</th>`;}).join('');
  const body=data.map(c=>{
    const d=c.deal_pct;
    const deal=(d==null)?'<span class="deal-na">—</span>'
      :`<span class="deal-badge ${d<0?'deal-good':'deal-bad'}">${d>0?'+':''}${d}%</span>`;
    const fl=facetLine(c), f=c.facets||{};
    const origin=f.country?`<span class="origin" title="${f.country}">${f.flag||'·'}</span>`:'';
    return `<tr class="${isActive(c)?'':'sold'}">
      <td class="num">${c.internal_id||''}</td>
      <td><a href="${c.url}" target="_blank" rel="noopener">${c.title||''}</a>${fl?`<div class="sub">${fl}</div>`:''}</td>
      <td class="num">${c.year||''}</td>
      <td class="num">${c.mileage!=null?Number(c.mileage).toLocaleString('pl-PL'):''}</td>
      <td class="num">${c.engine_power||''}</td>
      <td>${origin}</td>
      <td>${deal}</td>
      <td class="num">${fmt(c.current_price)}</td></tr>`;}).join('');
  const label = showHistorical ? `${data.length} listings (incl. historical)` : `${data.length} active listings`;
  host.innerHTML=`<div class="tablewrap">
    <div class="tbar"><span class="t">${label}</span>
      <label><input type="checkbox" class="dealsonly"${st.dealsOnly?' checked':''}> deals only</label></div>
    <div style="overflow:auto;max-height:460px"><table>
      <thead><tr>${head}</tr></thead><tbody>${body}</tbody></table></div></div>`;
  host.querySelectorAll('th').forEach(th=>{
    const act=()=>{const k=th.dataset.k;
      if(k===st.sortKey) st.asc=!st.asc;
      else {st.sortKey=k; st.asc=!NUMERIC.has(k);}
      renderTable(host, rows, st);};
    th.addEventListener('click',act);
    th.addEventListener('keydown',e=>{if(e.key==='Enter'||e.key===' '){e.preventDefault();act();}});
  });
  host.querySelector('.dealsonly').addEventListener('change',e=>{
    st.dealsOnly=e.target.checked; renderTable(host, rows, st);});
}

// ---- assemble ----
const root=document.getElementById('root');
renderGlobal();
const sections = MODELS.map((m,i)=>{
  const sec=document.createElement('section');
  sec.className='model'; sec.id='m-'+m.key;
  sec.innerHTML=`<div class="m-head"><h2>${m.label}</h2><span class="tag">${m.key}</span></div>
    <div class="facets facet-host"></div>
    <div class="kpis kpi-host"></div>
    <div class="charts">
      <div class="card"><h3>Deal finder</h3><p class="hint">price vs mileage · green = cheaper than expected</p><div class="plot deal"></div></div>
      <div class="card"><h3>Market trend</h3><p class="hint">median asking price over time</p><div class="plot trend"></div></div>
      <div class="card"><h3>Price by model year</h3><p class="hint">colour = mileage · amber = yearly median</p><div class="plot year"></div></div>
      <div class="card"><h3>Tracked price changes</h3><p class="hint">listings whose price moved (top 30)</p><div class="plot track"></div></div>
    </div>
    <div class="table-host"></div>`;
  root.appendChild(sec);
  const s={m, sec, state:{sortKey:'current_price', asc:true, dealsOnly:false, filters:{}}};
  // one delegated listener for this section's chips
  sec.querySelector('.facet-host').addEventListener('click', e=>{
    const clr=e.target.closest('.chip-clear'); if(clr){ s.state.filters={}; renderModel(s); return; }
    const chip=e.target.closest('.chip'); if(!chip) return;
    const {dim,val}=chip.dataset; const f=s.state.filters;
    (f[dim]=f[dim]||new Set()).has(val) ? f[dim].delete(val) : f[dim].add(val);
    renderModel(s);
  });
  return s;
});

function renderFacets(s){
  const m=s.m, base=rowsOf(m), filters=s.state.filters;
  const groups=FACET_DIMS.map(([dim,lab])=>{
      const dv=dimValues(m,dim);
      if(!dv.hasReal) return '';   // dimension doesn't apply to this model
      const chips=dv.values.map(val=>{
        const n=base.filter(c=>facetVal(c,dim)===val).length;
        const on=filters[dim] && filters[dim].has(val);
        const flag=(dim==='country' && val!==UNKNOWN && m.flags[val])?m.flags[val]+' ':'';
        const esc=val.replace(/"/g,'&quot;');
        return `<button class="chip${n?'':' empty'}" data-dim="${dim}" data-val="${esc}"
          aria-pressed="${on?'true':'false'}">${flag}${val}<span class="cnt">${n}</span></button>`;
      }).join('');
      return `<div class="facet-group"><span class="dim">${lab}</span>${chips}</div>`;
    }).join('');
  const any=Object.values(filters).some(set=>set&&set.size);
  s.sec.querySelector('.facet-host').innerHTML =
    groups + (any?`<button class="chip-clear">clear filters</button>`:'');
}

function renderModel(s){
  renderFacets(s);
  const rows=applyFacets(rowsOf(s.m), s.state.filters);
  s.sec.querySelector('.kpi-host').innerHTML = kpiCards(rows);
  dealChart(s.sec.querySelector('.deal'), rows);
  trendChart(s.sec.querySelector('.trend'), marketTrend(rows));
  yearChart(s.sec.querySelector('.year'), rows);
  trackChart(s.sec.querySelector('.track'), rows);
  renderTable(s.sec.querySelector('.table-host'), rows, s.state);
}
function renderAll(){ sections.forEach(renderModel); }

document.getElementById('histToggle').addEventListener('change', e=>{
  showHistorical = e.target.checked;
  renderAll();
});
renderAll();
</script>
</body>
</html>
