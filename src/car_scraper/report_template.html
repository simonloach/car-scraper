<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Car Tracker · market dashboard</title>
<script src="https://cdn.plot.ly/plotly-2.35.2.min.js" charset="utf-8"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;600&family=Fira+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0B0E14; --surface:#141A24; --surface-2:#1B2230; --border:#242C3A;
    --text:#E6EAF2; --muted:#8B95A7; --muted-2:#5C6678;
    --primary:#60A5FA; --primary-deep:#3B82F6; --accent:#F59E0B;
    --good:#34D399; --bad:#F87171;
    --r:12px; --r-sm:8px; --maxw:1180px;
    --sans:'Fira Sans',system-ui,sans-serif; --mono:'Fira Code',ui-monospace,monospace;
  }
  *{box-sizing:border-box}
  html{color-scheme:dark}
  body{margin:0;background:var(--bg);color:var(--text);font-family:var(--sans);
       font-size:16px;line-height:1.5;-webkit-font-smoothing:antialiased}
  .num{font-family:var(--mono);font-variant-numeric:tabular-nums;letter-spacing:-.01em}
  a{color:var(--primary);text-decoration:none}
  a:hover{text-decoration:underline}
  :focus-visible{outline:2px solid var(--primary);outline-offset:2px;border-radius:4px}
  .wrap{max-width:var(--maxw);margin:0 auto;padding:0 20px}

  /* header */
  header.top{position:sticky;top:0;z-index:20;background:rgba(11,14,20,.82);
    backdrop-filter:blur(10px);border-bottom:1px solid var(--border)}
  .top-row{display:flex;align-items:center;gap:14px;padding:14px 0}
  .brand{display:flex;align-items:center;gap:10px;font-weight:700;font-size:18px;letter-spacing:-.02em}
  .brand svg{color:var(--primary)}
  .gen{margin-left:auto;color:var(--muted);font-size:13px}
  nav.models{display:flex;gap:6px;flex-wrap:wrap;padding-bottom:12px}
  nav.models a{font-size:13px;font-weight:500;color:var(--muted);padding:6px 12px;
    border:1px solid var(--border);border-radius:999px;background:var(--surface);transition:.18s}
  nav.models a:hover{color:var(--text);border-color:var(--primary-deep);text-decoration:none}

  /* global kpi strip */
  .gkpis{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin:22px 0 8px}
  .gkpi{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:14px 16px}
  .gkpi .lab{color:var(--muted);font-size:12px;text-transform:uppercase;letter-spacing:.06em;
    display:flex;align-items:center;gap:7px}
  .gkpi .val{font-size:26px;font-weight:600;margin-top:6px}

  /* model section */
  section.model{margin:40px 0;scroll-margin-top:120px}
  .m-head{display:flex;align-items:baseline;gap:12px;flex-wrap:wrap;margin-bottom:14px}
  .m-head h2{font-size:21px;font-weight:600;margin:0;letter-spacing:-.02em}
  .m-head .tag{color:var(--muted);font-size:13px;font-family:var(--mono)}

  .kpis{display:grid;grid-template-columns:repeat(6,1fr);gap:10px;margin-bottom:16px}
  .kpi{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-sm);padding:12px}
  .kpi .lab{color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.05em;
    display:flex;align-items:center;gap:6px}
  .kpi .v{font-size:18px;font-weight:600;margin-top:6px}
  .kpi .sub{font-size:12px;color:var(--muted);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .pos{color:var(--good)} .neg{color:var(--bad)}

  .charts{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:14px 14px 6px}
  .card h3{margin:0 0 2px;font-size:14px;font-weight:600}
  .card .hint{margin:0 0 8px;font-size:12px;color:var(--muted)}
  .plot{height:300px}
  .empty{height:300px;display:flex;align-items:center;justify-content:center;color:var(--muted-2);font-size:13px}

  /* table */
  .tablewrap{margin-top:16px;background:var(--surface);border:1px solid var(--border);
    border-radius:var(--r);overflow:hidden}
  .tbar{display:flex;align-items:center;gap:14px;padding:12px 14px;border-bottom:1px solid var(--border)}
  .tbar .t{font-size:14px;font-weight:600}
  .tbar label{margin-left:auto;font-size:13px;color:var(--muted);display:flex;align-items:center;gap:7px;cursor:pointer}
  table{width:100%;border-collapse:collapse;font-size:13px}
  th,td{text-align:right;padding:9px 14px;border-bottom:1px solid var(--border);white-space:nowrap}
  th:nth-child(2),td:nth-child(2){text-align:left;white-space:normal}
  th{color:var(--muted);font-weight:500;font-size:11px;text-transform:uppercase;letter-spacing:.05em;
    cursor:pointer;user-select:none;position:sticky;top:0;background:var(--surface-2)}
  th[aria-sort] .car{opacity:1}
  tbody tr:hover{background:var(--surface-2)}
  tbody tr:last-child td{border-bottom:none}
  .deal-badge{display:inline-block;padding:1px 7px;border-radius:999px;font-family:var(--mono);
    font-size:12px;font-weight:500}
  .deal-good{background:rgba(52,211,153,.14);color:var(--good)}
  .deal-bad{background:rgba(248,113,113,.14);color:var(--bad)}
  .deal-na{color:var(--muted-2)}
  footer{color:var(--muted-2);font-size:12px;text-align:center;padding:36px 0 28px}

  @media(max-width:860px){
    .gkpis{grid-template-columns:repeat(2,1fr)}
    .kpis{grid-template-columns:repeat(2,1fr)}
    .charts{grid-template-columns:1fr}
  }
  @media(prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important}}
</style>
</head>
<body>
<header class="top">
  <div class="wrap">
    <div class="top-row">
      <span class="brand">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M5 17h14M5 17a2 2 0 1 0 0 .01M19 17a2 2 0 1 0 0 .01M3 13l2-5a2 2 0 0 1 1.9-1.4h10.2A2 2 0 0 1 19 8l2 5v3a1 1 0 0 1-1 1h-1M3 13h16M3 13v3a1 1 0 0 0 1 1h1"/></svg>
        Car Tracker
      </span>
      <span class="gen num">updated __GENERATED__</span>
    </div>
    <nav class="models" id="modelnav" aria-label="Models"></nav>
  </div>
</header>

<main class="wrap">
  <div class="gkpis" id="gkpis"></div>
  <div id="root"></div>
</main>
<footer>Daily otomoto.pl scrape · prices in PLN · deal score = price vs expected from mileage &amp; year</footer>

<script>
const GLOBAL = __GLOBAL_JSON__;
const MODELS = __MODELS_JSON__;

const C = {text:'#E6EAF2',muted:'#8B95A7',grid:'rgba(255,255,255,0.06)',
  primary:'#60A5FA',accent:'#F59E0B',good:'#34D399',bad:'#F87171'};
const fmt = n => (n==null||isNaN(n)) ? '—' : Number(Math.round(n)).toLocaleString('pl-PL')+' zł';
const fkm = n => (n==null||isNaN(n)) ? '—' : Number(Math.round(n)).toLocaleString('pl-PL')+' km';
const ICON = {
  car:'<path d="M5 11l1.5-4A2 2 0 0 1 8.4 5.7h7.2A2 2 0 0 1 17.5 7L19 11M4 11h16v4H4zM7 15v1M17 15v1"/>',
  tag:'<path d="M20 12l-8 8-9-9V3h8z"/><circle cx="7" cy="7" r="1.5"/>',
  gauge:'<path d="M12 13l4-3M4 18a8 8 0 1 1 16 0z"/>',
  trend:'<path d="M3 17l6-6 4 4 7-7M14 8h6v6"/>',
  drop:'<path d="M12 4v12M7 11l5 5 5-5"/>',
  spark:'<path d="M12 3l2.2 5.6L20 11l-5.8 2.4L12 19l-2.2-5.6L4 11l5.8-2.4z"/>'};
const svg = (p,cls='') => `<svg class="${cls}" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">${p}</svg>`;

const baseLayout = extra => Object.assign({
  paper_bgcolor:'rgba(0,0,0,0)', plot_bgcolor:'rgba(0,0,0,0)',
  font:{family:'Fira Sans, sans-serif', color:C.muted, size:12},
  margin:{t:8,r:12,b:38,l:60},
  xaxis:{gridcolor:C.grid,zerolinecolor:C.grid,linecolor:C.grid,ticksuffix:'',automargin:true},
  yaxis:{gridcolor:C.grid,zerolinecolor:C.grid,linecolor:C.grid,automargin:true},
  hoverlabel:{bgcolor:'#1B2230',bordercolor:'#242C3A',font:{family:'Fira Code',color:C.text}},
  showlegend:false
}, extra||{});
const cfg = {displayModeBar:false, responsive:true};

function linfit(xs, ys){
  const n=xs.length; if(n<2) return null;
  let sx=0,sy=0,sxx=0,sxy=0;
  for(let i=0;i<n;i++){sx+=xs[i];sy+=ys[i];sxx+=xs[i]*xs[i];sxy+=xs[i]*ys[i];}
  const d=n*sxx-sx*sx; if(Math.abs(d)<1e-9) return null;
  const m=(n*sxy-sx*sy)/d; return {m, b:(sy-m*sx)/n};
}

// ---- global KPIs ----
function renderGlobal(){
  const g=document.getElementById('gkpis');
  const cards=[
    ['Cars tracked', ICON.car, GLOBAL.active],
    ['Models', ICON.spark, GLOBAL.models],
    ['Active price drops', ICON.drop, GLOBAL.drops],
    ['Last scrape', ICON.trend, '<span style="font-size:18px">'+(GLOBAL.generated||'—')+'</span>'],
  ];
  g.innerHTML = cards.map(([lab,ic,val])=>`
    <div class="gkpi"><div class="lab">${svg(ic)}${lab}</div>
    <div class="val num">${val}</div></div>`).join('');
  document.getElementById('modelnav').innerHTML =
    MODELS.map(m=>`<a href="#m-${m.key}">${m.label}</a>`).join('');
}

// ---- per-model KPI cards ----
function dealHTML(ref){
  if(!ref) return '<span class="deal-na">—</span>';
  const d = ref.deal_pct;
  const badge = (d==null)?'' :
    ` <span class="deal-badge ${d<0?'deal-good':'deal-bad'}">${d>0?'+':''}${d}%</span>`;
  return `<a href="${ref.url}" target="_blank" rel="noopener">#${ref.internal_id}</a>${badge}`;
}
function kpiCards(m){
  const k=m.kpis;
  const cards=[
    ['Active', ICON.car, `<span class="num">${k.count}</span>`, ''],
    ['Median price', ICON.tag, `<span class="num">${fmt(k.median)}</span>`, ''],
    ['Cheapest', ICON.tag, k.cheapest?`<a class="num" href="${k.cheapest.url}" target="_blank" rel="noopener">${fmt(k.cheapest.price)}</a>`:'—',
      k.cheapest?`#${k.cheapest.internal_id}`:''],
    ['Lowest mileage', ICON.gauge, k.low_km?`<span class="num">${fkm(k.low_km.mileage)}</span>`:'—',
      k.low_km?`<a href="${k.low_km.url}" target="_blank" rel="noopener">#${k.low_km.internal_id}</a>`:''],
    ['Best deal', ICON.spark, k.best_deal?`<span class="num pos">${k.best_deal.deal_pct}%</span>`:'—',
      k.best_deal?`<a href="${k.best_deal.url}" target="_blank" rel="noopener">#${k.best_deal.internal_id} · ${fmt(k.best_deal.price)}</a>`:'below expected'],
    ['Price drops', ICON.drop, `<span class="num ${k.drops?'pos':''}">${k.drops}</span>`, k.drops?'tracked':''],
  ];
  return `<div class="kpis">`+cards.map(([lab,ic,v,sub])=>`
    <div class="kpi"><div class="lab">${svg(ic)}${lab}</div>
    <div class="v">${v}</div><div class="sub">${sub||''}</div></div>`).join('')+`</div>`;
}

// ---- charts ----
function dealChart(el, m){
  const ls=m.listings.filter(l=>l.current_price>0 && l.mileage!=null);
  if(ls.length<2){ el.outerHTML='<div class="empty">Not enough listings yet</div>'; return; }
  const x=ls.map(l=>l.mileage), y=ls.map(l=>l.current_price);
  const color=ls.map(l=>l.deal_pct==null?0:Math.max(-15,Math.min(15,l.deal_pct)));
  const scored=ls.some(l=>l.deal_pct!=null);
  const txt=ls.map(l=>`#${l.internal_id} ${l.title||''}<br>${(l.year||'')} · ${fkm(l.mileage)}<br>${fmt(l.current_price)}`
      + (l.deal_pct!=null?`<br>${l.deal_pct>0?'+':''}${l.deal_pct}% vs expected`:''));
  const traces=[{x,y,text:txt,mode:'markers',type:'scatter',hovertemplate:'%{text}<extra></extra>',
    marker:{size:12,color:scored?color:C.primary,
      colorscale:scored?[[0,C.good],[0.5,'#64748B'],[1,C.bad]]:undefined,
      cmin:-15,cmax:15,showscale:scored,line:{width:1,color:'rgba(255,255,255,.15)'},
      colorbar:scored?{title:{text:'deal %',font:{size:10}},thickness:8,len:.7,x:1.02}:undefined}}];
  const f=linfit(x,y);
  if(f){const xs=[Math.min(...x),Math.max(...x)];
    traces.unshift({x:xs,y:xs.map(v=>f.m*v+f.b),mode:'lines',hoverinfo:'skip',
      line:{color:'rgba(255,255,255,.18)',dash:'dot',width:1.5}});}
  Plotly.newPlot(el,traces,baseLayout({xaxis:{title:{text:'mileage (km)'},gridcolor:C.grid},
    yaxis:{title:{text:'price'},gridcolor:C.grid}}),cfg);
}
function trendChart(el, m){
  const t=m.trend||[];
  if(t.length<2){ el.outerHTML='<div class="empty">Collecting history — needs ≥2 scrape days</div>'; return; }
  Plotly.newPlot(el,[{x:t.map(p=>p.date),y:t.map(p=>p.median),mode:'lines+markers',
    line:{color:C.primary,width:2,shape:'spline'},marker:{size:5,color:C.primary},
    fill:'tozeroy',fillcolor:'rgba(96,165,250,.08)',
    text:t.map(p=>`${p.count} cars`),hovertemplate:'%{x}<br>median %{y:,.0f} zł<br>%{text}<extra></extra>'}],
    baseLayout({yaxis:{title:{text:'median price'},gridcolor:C.grid,rangemode:'tozero'},
      xaxis:{gridcolor:C.grid}}),cfg);
}
function yearChart(el, m){
  const ls=m.listings.filter(l=>l.year && l.current_price>0);
  if(ls.length<2){ el.outerHTML='<div class="empty">Not enough listings yet</div>'; return; }
  const byYear={}; ls.forEach(l=>{(byYear[l.year]=byYear[l.year]||[]).push(l.current_price);});
  const years=Object.keys(byYear).map(Number).sort((a,b)=>a-b);
  const med=years.map(y=>{const a=byYear[y].slice().sort((p,q)=>p-q);return a[Math.floor(a.length/2)];});
  Plotly.newPlot(el,[
    {x:ls.map(l=>l.year),y:ls.map(l=>l.current_price),mode:'markers',type:'scatter',
     text:ls.map(l=>`#${l.internal_id} ${l.title||''}<br>${fkm(l.mileage)}`),
     hovertemplate:'%{text}<br>%{y:,.0f} zł<extra></extra>',
     marker:{size:10,color:ls.map(l=>l.mileage||0),colorscale:'Viridis',showscale:true,
       colorbar:{title:{text:'km',font:{size:10}},thickness:8,len:.7,x:1.02},
       line:{width:1,color:'rgba(255,255,255,.12)'}}},
    {x:years,y:med,mode:'lines+markers',line:{color:C.accent,width:2},marker:{size:6,color:C.accent},
     hovertemplate:'%{x} median %{y:,.0f} zł<extra></extra>'}
  ],baseLayout({xaxis:{title:{text:'model year'},dtick:1,gridcolor:C.grid},
    yaxis:{title:{text:'price'},gridcolor:C.grid}}),cfg);
}
function trackChart(el, m){
  const traces=[];
  m.listings.forEach(l=>{
    const pr=(l.price_readings||[]).filter(r=>r[1]>0);
    if(pr.length<2) return;
    traces.push({x:pr.map(r=>new Date(r[0]*1000)),y:pr.map(r=>r[1]),mode:'lines+markers',
      name:'#'+l.internal_id,text:l.title,
      hovertemplate:'#'+l.internal_id+' %{y:,.0f} zł<extra></extra>',
      line:{width:1.6},marker:{size:4}});
  });
  if(!traces.length){ el.outerHTML='<div class="empty">No tracked price changes yet</div>'; return; }
  Plotly.newPlot(el,traces,baseLayout({yaxis:{title:{text:'price'},gridcolor:C.grid},
    xaxis:{gridcolor:C.grid},showlegend:traces.length<=8,
    legend:{font:{size:9},orientation:'h',y:-0.25}}),cfg);
}

// ---- table ----
function tableHTML(m){
  const cols=[
    ['#','internal_id','num'],['Title','title','t'],['Year','year','num'],
    ['Mileage','mileage','num'],['Power','engine_power','num'],['Gearbox','gearbox','t'],
    ['Deal','deal_pct','num'],['Price','current_price','num']];
  const head=cols.map(([lab,key])=>`<th data-k="${key}" tabindex="0" role="columnheader">${lab}</th>`).join('');
  return `<div class="tablewrap">
    <div class="tbar"><span class="t">${m.kpis.count} active listings</span>
      <label><input type="checkbox" class="dealsonly"> deals only</label></div>
    <div style="overflow:auto;max-height:460px"><table><thead><tr>${head}</tr></thead>
    <tbody></tbody></table></div></div>`;
}
function fillTable(sec, m, sortKey='current_price', asc=true, dealsOnly=false){
  let rows=m.listings.slice();
  if(dealsOnly) rows=rows.filter(l=>l.deal_pct!=null && l.deal_pct<0);
  rows.sort((a,b)=>{const x=a[sortKey],y=b[sortKey];
    if(x==null)return 1; if(y==null)return -1;
    return (typeof x==='number')?(asc?x-y:y-x):String(x).localeCompare(String(y))*(asc?1:-1);});
  const tb=sec.querySelector('tbody');
  tb.innerHTML=rows.map(l=>{
    const d=l.deal_pct;
    const deal=(d==null)?'<span class="deal-na">—</span>'
      :`<span class="deal-badge ${d<0?'deal-good':'deal-bad'}">${d>0?'+':''}${d}%</span>`;
    return `<tr>
      <td class="num">${l.internal_id||''}</td>
      <td><a href="${l.url}" target="_blank" rel="noopener">${l.title||''}</a></td>
      <td class="num">${l.year||''}</td>
      <td class="num">${l.mileage!=null?Number(l.mileage).toLocaleString('pl-PL'):''}</td>
      <td class="num">${l.engine_power||''}</td>
      <td>${l.gearbox||''}</td>
      <td>${deal}</td>
      <td class="num">${fmt(l.current_price)}</td></tr>`;}).join('');
  sec.querySelectorAll('th').forEach(th=>th.removeAttribute('aria-sort'));
  const th=sec.querySelector(`th[data-k="${sortKey}"]`);
  if(th) th.setAttribute('aria-sort',asc?'ascending':'descending');
}

// ---- assemble ----
const root=document.getElementById('root');
renderGlobal();
MODELS.forEach((m,i)=>{
  const sec=document.createElement('section');
  sec.className='model'; sec.id='m-'+m.key;
  sec.innerHTML=`<div class="m-head"><h2>${m.label}</h2><span class="tag">${m.key}</span></div>
    ${kpiCards(m)}
    <div class="charts">
      <div class="card"><h3>Deal finder</h3><p class="hint">price vs mileage · green = cheaper than expected</p><div class="plot" id="deal-${i}"></div></div>
      <div class="card"><h3>Market trend</h3><p class="hint">median asking price over time</p><div class="plot" id="trend-${i}"></div></div>
      <div class="card"><h3>Price by model year</h3><p class="hint">colour = mileage · amber = yearly median</p><div class="plot" id="year-${i}"></div></div>
      <div class="card"><h3>Tracked price changes</h3><p class="hint">listings whose price moved</p><div class="plot" id="track-${i}"></div></div>
    </div>
    ${tableHTML(m)}`;
  root.appendChild(sec);
  dealChart(document.getElementById('deal-'+i), m);
  trendChart(document.getElementById('trend-'+i), m);
  yearChart(document.getElementById('year-'+i), m);
  trackChart(document.getElementById('track-'+i), m);

  let sortKey='current_price', asc=true, dealsOnly=false;
  fillTable(sec, m, sortKey, asc, dealsOnly);
  sec.querySelectorAll('th').forEach(th=>{
    const act=()=>{const k=th.dataset.k; if(k===sortKey)asc=!asc; else {sortKey=k;asc=(k==='current_price'||k==='mileage'||k==='deal_pct');}
      fillTable(sec,m,sortKey,asc,dealsOnly);};
    th.addEventListener('click',act);
    th.addEventListener('keydown',e=>{if(e.key==='Enter'||e.key===' '){e.preventDefault();act();}});
  });
  sec.querySelector('.dealsonly').addEventListener('change',e=>{
    dealsOnly=e.target.checked; fillTable(sec,m,sortKey,asc,dealsOnly);});
});
</script>
</body>
</html>
