repos:
  # General file hygiene
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-toml
      - id: check-merge-conflict
      - id: check-case-conflict
      - id: check-added-large-files
        args: ['--maxkb=1000']
      - id: debug-statements

  # Lint + format (replaces black, isort, flake8 and their plugins)
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.6.9
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  # Security scanning
  - repo: https://github.com/pycqa/bandit
    rev: 1.7.5
    hooks:
      - id: bandit
        args: [-c, pyproject.toml, -r, src/]
        # bandit 1.7.5 imports pbr at runtime but doesn't pull it in the
        # isolated hook env -> add it explicitly so the hook can start.
        additional_dependencies: ["bandit[toml]", "pbr"]

  # Type checking
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.8.0
    hooks:
      - id: mypy
        additional_dependencies:
          - types-requests
          - types-beautifulsoup4
          - pydantic  # required by plugins=["pydantic.mypy"] in pyproject
        args: [--config-file=pyproject.toml]
        exclude: ^tests/

default_language_version:
  python: python3.10

exclude: |
  (?x)(
      ^data/|
      ^plots/|
      ^\.git/|
      ^\.venv/|
      ^build/|
      ^dist/|
      \.egg-info/
  )

fail_fast: false
